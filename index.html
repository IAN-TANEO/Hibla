<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hibla | Relic Edition</title>

    <!-- Relic Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Inter:wght@300;400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

    <div id="hud">Drag to explore the infinite map. Double-tap to leave a memory.</div>

    <div id="viewport">
        <div id="map">
            <!-- Embers, Banners, and Threads will be injected here -->
        </div>
    </div>

    <!-- ADD MEMORY MODAL -->
    <div id="add-modal" class="glass-panel" style="display:none;">
        <h2>Leave a Memory</h2>
        <textarea id="thought-input" placeholder="Write something you can't say aloud..."></textarea>

        <div class="music-section">
            <input type="text" id="music-input" placeholder="Select a song for this memory (OPM)...">
            <div id="search-results" class="search-results"></div>
            <div id="selected-song" class="selected-song"></div>
        </div>

        <button id="submit-btn" class="btn">Leave Memory</button>
        <div class="close-hint">Tap outside to cancel</div>
    </div>

    <!-- VIEW MEMORY CARD (POSTCARD) -->
    <div id="view-card" class="glass-panel" style="display:none;">
        <p id="thought-display" class="thought-text"></p>
        <div id="player-anchor"></div>
        <div class="close-hint">Tap outside to close</div>
    </div>

    <div id="credits-btn">🪶</div>

    <script src="script.js"></script>
</body>

</html>
